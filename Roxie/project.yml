name: Roxie
options:
  bundleIdPrefix: com.vivivi
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "6BZ59393SB"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Roxie:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Roxie
        excludes:
          - "Preview Content/**"
      - path: Roxie/Preview Content
        buildPhase: resources
    resources:
      - path: Roxie/Resources/HTML
        type: folder
    info:
      path: Roxie/Info.plist
      properties:
        CFBundleDisplayName: Roxie
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        UIUserInterfaceStyle: Light
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "We need access to your Camera to capture photos and videos for VRM interactions."
        NSMicrophoneUsageDescription: "We need access to your Microphone for voice conversations with VRM characters."
        NSPhotoLibraryUsageDescription: "We need access to your Photo Library to save and load media files."
        NSPhotoLibraryAddUsageDescription: "We need permission to add media files to your Photo Library when you save them."
        NSUserTrackingUsageDescription: "This identifier may be used to personalize your experience."
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.vivivi.scheme
            CFBundleURLSchemes:
              - roxie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vivivi
        DEVELOPMENT_TEAM: "6BZ59393SB"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Roxie/Roxie.entitlements
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_ASSET_PATHS: "\"Roxie/Preview Content\""
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        Release:
          SWIFT_COMPILATION_MODE: wholemodule

schemes:
  Roxie:
    build:
      targets:
        Roxie: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
